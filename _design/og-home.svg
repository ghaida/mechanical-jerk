<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="glow" cx="50%" cy="45%" r="45%">
      <stop offset="0%" stop-color="#c0401e" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#08080a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="#08080a"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Logo -->
  <g transform="translate(510, 90) scale(0.9)">
    <path d="M 100 88 C 68 48, 12 52, 14 100 C 16 148, 70 152, 100 112 C 122 148, 168 144, 170 108 C 172 72, 128 60, 100 88 Z" fill="none" stroke="#c0401e" stroke-width="10" stroke-linejoin="round" stroke-linecap="round"/>
    <circle cx="55" cy="100" r="14" fill="none" stroke="#c0401e" stroke-width="7" opacity="0.35"/>
  </g>

  <!-- CHADGPT — all caps, Space Grotesk 700, letter-spacing -0.03em -->
  <text x="600" y="380" text-anchor="middle" font-family="Space Grotesk" font-size="140" font-weight="700" letter-spacing="-4" fill="#eeeeee" text-rendering="geometricPrecision">CHAD<tspan fill="#c0401e">GPT</tspan></text>

  <!-- by Mechanical Jerk — Oswald, uppercase, spaced -->
  <text x="600" y="435" text-anchor="middle" font-family="Oswald" font-size="28" font-weight="400" letter-spacing="5" fill="#7e7e8a" text-rendering="geometricPrecision">BY <tspan font-weight="500" fill="#aaaaaa">MECHANICAL JERK</tspan></text>
</svg>
